name = "runtheaiplay"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# Cloudflare D1 binding for the production Prisma client.
# After you run `npx wrangler d1 create runtheaiplay-db`, paste the
# database_id into the field below (and into Cloudflare Pages →
# Settings → Functions → D1 database bindings).
[[d1_databases]]
binding = "DB"
database_name = "runtheaiplay-db"
database_id = "REPLACE_WITH_DB_ID_AFTER_WRANGLER_D1_CREATE"
